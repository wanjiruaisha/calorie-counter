<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0" >
  <title>Calorie Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" >
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

     <!-- Main Application Container -->
  <main class="bg-white w-full max-w-xl rounded-2xl shadow-lg p-6">
    <h1 class="text-3xl font-bold text-center text-emerald-600 mb-2">
      Calorie Counter
    </h1>

    <p class="text-center text-gray-500 mb-6">
      Track your daily food calories
    </p>

        <!-- Form For Adding Food Items -->
    <form id="foodForm" class="space-y-4">
      <input
        type="text"
        id="foodName"
        placeholder="Food name e.g. Rice"
        class="w-full border p-3 rounded-lg"
        required
      />

      <input
        type="number"
        id="calories"
        placeholder="Calories e.g. 250"
        class="w-full border p-3 rounded-lg"
        readonly
      />

      <button
        type="submit"
        class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700"
      >
        Add Food
      </button>
    </form>

    <p id="message" class="text-center mt-3 text-sm"></p>

    <!-- Food Items Display Section -->
    <section class="mt-6">
      <h2 class="text-xl font-semibold mb-3">Food Items</h2>
      <ul id="foodList" class="space-y-3"></ul>
    </section>

    <!-- Total Calories Section -->
    <section class="mt-6 bg-emerald-50 p-4 rounded-lg">
      <h2 class="text-lg font-bold">
        Total Calories: <span id="totalCalories">0</span>
      </h2>

      <div class="w-full bg-gray-200 rounded-full h-4 mt-3">
        <div id="progressBar" class="bg-emerald-600 h-4 rounded-full w-0"></div>
      </div>

      <p class="text-sm text-gray-500 mt-2">
        Daily goal: 2000 calories
      </p>
    </section>

    <button
      id="resetBtn"
      class="w-full mt-5 bg-amber-500 text-white py-3 rounded-lg hover:bg-amber-600"
    >
      Reset Day
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
